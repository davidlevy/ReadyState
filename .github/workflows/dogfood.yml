name: ReadyState Dogfooding

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  notify-readystate:
    runs-on: ubuntu-latest
    steps:
      - name: Send Webhook to ReadyState
        env:
          READYSTATE_WEBHOOK_URL: ${{ secrets.READYSTATE_WEBHOOK_URL }}
          READYSTATE_WRITE_TOKEN: ${{ secrets.READYSTATE_WRITE_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          if [ -z "$READYSTATE_WEBHOOK_URL" ] || [ -z "$READYSTATE_WRITE_TOKEN" ]; then
            echo "Secrets READYSTATE_WEBHOOK_URL or READYSTATE_WRITE_TOKEN are missing. Skipping webhook."
            exit 0
          fi
          
          node -e "
            const crypto = require('crypto');
            const https = require('https');
            const http = require('http');
            
            const url = new URL(process.env.READYSTATE_WEBHOOK_URL);
            const payload = JSON.stringify({
              state: 'success',
              environment: 'production',
              sha: process.env.COMMIT_SHA,
              repository: {
                full_name: process.env.GITHUB_REPOSITORY
              }
            });
            
            const signature = 'sha256=' + crypto.createHmac('sha256', process.env.READYSTATE_WRITE_TOKEN)
              .update(payload)
              .digest('hex');
            
            const options = {
              hostname: url.hostname,
              port: url.port || (url.protocol === 'https:' ? 443 : 80),
              path: url.pathname + url.search,
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Content-Length': Buffer.byteLength(payload),
                'x-hub-signature-256': signature
              }
            };
            
            console.log('Sending webhook to:', url.href);
            console.log('Payload:', payload);
            
            const req = (url.protocol === 'https:' ? https : http).request(options, (res) => {
              console.log('Response Status: ' + res.statusCode);
              res.on('data', (d) => process.stdout.write(d));
              res.on('end', () => console.log('\nWebhook sent successfully.'));
            });
            
            req.on('error', (e) => {
              console.error('Error sending webhook:', e);
              process.exit(1);
            });
            
            req.write(payload);
            req.end();
          "
