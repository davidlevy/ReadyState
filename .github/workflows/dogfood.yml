name: ReadyState Dogfooding

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  notify-readystate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync Capabilities to ReadyState
        env:
          READYSTATE_SYNC_URL: ${{ secrets.READYSTATE_SYNC_URL }}
          READYSTATE_WRITE_TOKEN: ${{ secrets.READYSTATE_WRITE_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          if [ -z "$READYSTATE_SYNC_URL" ] || [ -z "$READYSTATE_WRITE_TOKEN" ]; then
            echo "Secrets READYSTATE_SYNC_URL or READYSTATE_WRITE_TOKEN are missing."
            exit 1
          fi
          
          curl -f -X POST "$READYSTATE_SYNC_URL" \
            -H "Authorization: Bearer $READYSTATE_WRITE_TOKEN" \
            -H "x-environment: production" \
            -H "x-commit-sha: $COMMIT_SHA" \
            -H "Content-Type: application/x-yaml" \
            --data-binary @readystate-manifest.yml
